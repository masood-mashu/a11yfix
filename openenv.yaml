id: a11yfix
name: A11yFix - Web Accessibility Repair Lab
description: RL environment for repairing web accessibility violations in a JSON DOM

version: "1.0.0"

entry_point: env.a11y_env:create_default_env

# ---------- OBSERVATION SPACE ----------
observation_space:
  type: object
  properties:
    elements:
      type: array
      description: JSON DOM elements
    audit:
      type: array
      description: Violations returned only when audit action is used
    score:
      type: number
      description: Accessibility score strictly between 0 and 1
    step_count:
      type: integer
    max_steps:
      type: integer

# ---------- ACTION SPACE ----------
action_space:
  type: object
  description: Structured action API (set_attribute, audit, done) with tuple compatibility
  actions:
    - set_attribute
    - audit
    - done

# ---------- REWARD ----------
reward_range: [-1.0, 1.0]

# ---------- GLOBAL SETTINGS ----------
max_steps: 10

# ---------- TASKS (CRITICAL) ----------
tasks:
  - id: easy
    description: Fix a single missing alt text on an image
    difficulty: easy
    max_steps: 8
    entry_point: tasks.easy:run_task

  - id: medium
    description: Fix mixed violations across multiple elements
    difficulty: medium
    max_steps: 6
    entry_point: tasks.medium:run_task

  - id: hard
    description: Fix multiple violations across all element types within a tight step budget
    difficulty: hard
    max_steps: 10
    entry_point: tasks.hard:run_task
